<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoodieGo — Đặt món ngon, giao tận nơi</title>
  <meta name="description" content="FoodieGo - Khám phá hàng trăm nhà hàng, đặt món yêu thích và nhận giao hàng tận nơi.">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Hero ─────────────────────────────────────────────────── */
    .hero {
      padding: 5rem 0 3rem;
      text-align: center;
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0.4rem 1rem;
      background: rgba(255,107,53,0.12);
      border: 1px solid rgba(255,107,53,0.3);
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 1.5rem;
    }
    .hero h1 {
      font-size: clamp(2.4rem, 5vw, 3.8rem);
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #fff 0%, #ff8c5a 60%, #ff6b35 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p {
      font-size: 1.1rem;
      color: var(--text-secondary);
      max-width: 520px;
      margin: 0 auto 2rem;
    }
    .hero-actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .hero-stats {
      display: flex;
      gap: 2rem;
      justify-content: center;
      margin-top: 3rem;
      flex-wrap: wrap;
    }
    .stat-item { text-align: center; }
    .stat-value { font-size: 1.8rem; font-weight: 800; color: var(--accent); display: block; }
    .stat-label { font-size: 0.82rem; color: var(--text-muted); }

    /* ── Search Bar ───────────────────────────────────────────── */
    .search-section { padding: 0 0 2rem; }
    .search-bar {
      display: flex;
      gap: 0;
      max-width: 560px;
      margin: 0 auto;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .search-bar:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    #search-input {
      flex: 1;
      background: none;
      border: none;
      padding: 0.9rem 1.2rem;
      color: var(--text-primary);
      font-size: 0.95rem;
      outline: none;
    }
    #search-input::placeholder { color: var(--text-muted); }
    .search-btn {
      background: var(--accent);
      border: none;
      padding: 0.9rem 1.4rem;
      color: #fff;
      font-size: 1.1rem;
      transition: background var(--transition);
    }
    .search-btn:hover { background: var(--accent-light); }

    /* ── Restaurant Card ──────────────────────────────────────── */
    .restaurant-card {
      cursor: pointer;
      position: relative;
    }
    .restaurant-card .card-img-wrap {
      position: relative;
      overflow: hidden;
      height: 180px;
    }
    .restaurant-card .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }
    .restaurant-card:hover .card-img-wrap img { transform: scale(1.06); }
    .restaurant-card .status-dot {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 700;
      backdrop-filter: blur(10px);
    }
    .status-dot.open  { background: rgba(34,197,94,0.85);  color: #fff; }
    .status-dot.closed{ background: rgba(239,68,68,0.85);  color: #fff; }
    .restaurant-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
      flex-wrap: wrap;
    }
    .restaurant-meta span { font-size: 0.8rem; color: var(--text-muted); }
    .restaurant-meta .sep { color: var(--border); }

    /* ── Navbar user menu ─────────────────────────────────────── */
    .user-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0.4rem 0.9rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color var(--transition);
    }
    .user-chip:hover { border-color: var(--accent); }
    .user-avatar {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="bg-orbs"></div>
  <div id="toast-container"></div>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">
      <span class="logo-icon">🍜</span>
      Foodie<span>Go</span>
    </a>
    <div class="navbar-nav" id="nav-items">
      <!-- Injected by JS -->
    </div>
  </nav>

  <div class="page-wrapper">
    <div class="container">

      <!-- Hero -->
      <section class="hero fade-in">
        <div class="hero-badge">🔥 Hơn 100+ món ăn hấp dẫn</div>
        <h1>Đặt Món Ngon<br>Giao Tận Nơi</h1>
        <p>Khám phá hàng trăm nhà hàng, lựa chọn món yêu thích và nhận hàng nhanh chóng tại cửa nhà bạn.</p>
        <div class="hero-actions">
          <a href="#restaurants" class="btn btn-primary btn-lg">🍽️ Xem nhà hàng</a>
          <a href="orders.html" class="btn btn-ghost btn-lg" id="my-orders-btn">📦 Đơn của tôi</a>
        </div>
        <div class="hero-stats">
          <div class="stat-item"><span class="stat-value" id="stat-restaurants">–</span><span class="stat-label">Nhà hàng</span></div>
          <div class="stat-item"><span class="stat-value">500+</span><span class="stat-label">Món ăn</span></div>
          <div class="stat-item"><span class="stat-value">30'</span><span class="stat-label">Giao hàng trung bình</span></div>
        </div>
      </section>

      <!-- Search -->
      <section class="search-section fade-in fade-in-delay-1">
        <div class="search-bar">
          <input type="text" id="search-input" placeholder="🔍  Tìm nhà hàng theo tên, địa chỉ...">
          <button class="search-btn" onclick="filterRestaurants()">🔍</button>
        </div>
      </section>

      <!-- Restaurants Grid -->
      <section class="section fade-in fade-in-delay-2" id="restaurants">
        <div class="section-header d-flex justify-between align-center">
          <div>
            <h2 class="section-title">Nhà hàng nổi bật</h2>
            <p class="section-subtitle">Khám phá các nhà hàng đang hoạt động</p>
          </div>
          <span id="restaurant-count" class="text-muted" style="font-size:0.85rem;"></span>
        </div>
        <div id="restaurants-grid" class="grid grid-3">
          <!-- Loaded by JS -->
        </div>
      </section>

    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    // ── Navbar ──────────────────────────────────────────────────
    function renderNav() {
      const nav = document.getElementById('nav-items');
      if (isLoggedIn()) {
        const user = getUser();
        const initials = user.name?.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase() || '?';
        nav.innerHTML = `
          <a href="orders.html" class="nav-link">📦 Đơn hàng</a>
          ${isAdmin() ? '<a href="admin.html" class="nav-link">⚙️ Admin</a>' : ''}
          <div class="user-chip" onclick="logout()">
            <div class="user-avatar">${initials}</div>
            <span>${user.name?.split(' ').pop()}</span>
            <span class="text-muted">· Đăng xuất</span>
          </div>
        `;
      } else {
        nav.innerHTML = `
          <a href="login.html" class="btn btn-ghost btn-sm">Đăng nhập</a>
          <a href="login.html" class="btn btn-primary btn-sm">Đăng ký</a>
        `;
      }
    }

    // ── Restaurant Cards ─────────────────────────────────────────
    const PLACEHOLDER_IMGS = [
      'https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=400&q=80',
      'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=400&q=80',
      'https://images.unsplash.com/photo-1484659619207-9165d119dafe?w=400&q=80',
      'https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=400&q=80',
      'https://images.unsplash.com/photo-1552566626-52f8b828add9?w=400&q=80',
      'https://images.unsplash.com/photo-1537047902294-62a40c20a6ae?w=400&q=80',
    ];

    let allRestaurants = [];

    function renderRestaurantCard(r, idx) {
      const img = PLACEHOLDER_IMGS[idx % PLACEHOLDER_IMGS.length];
      const isOpen = r.status !== 'closed';
      return `
        <div class="card restaurant-card fade-in" onclick="goToRestaurant(${r.id})">
          <div class="card-img-wrap">
            <img src="${img}" alt="${r.name}" loading="lazy">
            <span class="status-dot ${isOpen ? 'open' : 'closed'}">${isOpen ? '🟢 Mở cửa' : '🔴 Đóng cửa'}</span>
          </div>
          <div class="card-body">
            <h3 class="card-title">${r.name}</h3>
            <p class="card-text" style="margin-bottom:0.6rem;">📍 ${r.address || 'TP. Hồ Chí Minh'}</p>
            <div class="restaurant-meta">
              <span>📞 ${r.phone || 'N/A'}</span>
              <span class="sep">•</span>
              <span>⏱️ 25–40 phút</span>
              <span class="sep">•</span>
              <span>⭐ 4.${Math.floor(Math.random()*5)+3}</span>
            </div>
          </div>
        </div>
      `;
    }

    function renderGrid(list) {
      const grid = document.getElementById('restaurants-grid');
      const count = document.getElementById('restaurant-count');
      if (!list.length) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <div class="empty-icon">🍽️</div>
            <h3>Không tìm thấy nhà hàng</h3>
            <p>Thử tìm kiếm với từ khóa khác</p>
          </div>`;
        count.textContent = '';
        return;
      }
      count.textContent = `${list.length} nhà hàng`;
      grid.innerHTML = list.map((r, i) => renderRestaurantCard(r, i)).join('');
    }

    function filterRestaurants() {
      const q = document.getElementById('search-input').value.toLowerCase().trim();
      if (!q) { renderGrid(allRestaurants); return; }
      const filtered = allRestaurants.filter(r =>
        r.name?.toLowerCase().includes(q) ||
        r.address?.toLowerCase().includes(q)
      );
      renderGrid(filtered);
    }

    document.getElementById('search-input').addEventListener('keyup', e => {
      if (e.key === 'Enter') filterRestaurants();
      else filterRestaurants();
    });

    function goToRestaurant(id) {
      window.location.href = `restaurant.html?id=${id}`;
    }

    // ── Load Data ────────────────────────────────────────────────
    async function loadPage() {
      renderNav();

      const grid = document.getElementById('restaurants-grid');
      grid.innerHTML = `<div class="loading-center" style="grid-column:1/-1"><div class="spinner"></div><span>Đang tải nhà hàng...</span></div>`;

      try {
        allRestaurants = await restaurantsAPI.getAll();
        document.getElementById('stat-restaurants').textContent = allRestaurants.length + '+';
        renderGrid(allRestaurants);
      } catch (err) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <div class="empty-icon">⚠️</div>
            <h3>Không thể kết nối backend</h3>
            <p>Kiểm tra backend đang chạy tại <strong>http://localhost:3000</strong></p>
            <button class="btn btn-primary mt-2" onclick="loadPage()">Thử lại</button>
          </div>`;
        showToast('Không kết nối được backend!', 'error');
      }
    }

    loadPage();
  </script>
</body>
</html>
