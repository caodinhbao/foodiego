version: '3.9'

services:
  # ── MySQL ──────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: foodiego_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: foodiego_db
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/migrations/001_init_mysql.sql:/docker-entrypoint-initdb.d/001_init_mysql.sql
      - ./backend/migrations/002_mysql.sql:/docker-entrypoint-initdb.d/002_mysql.sql
      - ./backend/migrations/003_new_features.sql:/docker-entrypoint-initdb.d/003_new_features.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (Node.js + Express) ────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: foodiego_backend
    environment:
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: foodiego_db
      JWT_SECRET: super_secret_change_in_prod
      JWT_EXPIRES_IN: 7d
      DELIVERY_SERVICE_URL: http://delivery-service:8000
      NODE_ENV: production
    ports:
      - '3000:3000'
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure

  # ── Delivery Fee Service (Python FastAPI) ──────────────────────────────────
  delivery-service:
    build:
      context: ./delivery-service
      dockerfile: Dockerfile
    container_name: foodiego_delivery
    ports:
      - '8000:8000'
    restart: on-failure

volumes:
  mysql_data:
