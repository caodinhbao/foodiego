name: FoodieGo CI

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

jobs:
  # ── Lint + Test (Node.js Backend) ──────────────────────────────────────────
  backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: foodiego_db_test
          MYSQL_USER: foodiego
          MYSQL_PASSWORD: foodiego123
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run ESLint
        working-directory: backend
        run: npm run lint

      - name: Run tests
        working-directory: backend
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: foodiego
          DB_PASSWORD: foodiego123
          DB_NAME: foodiego_db_test
          JWT_SECRET: test_secret_ci
          JWT_EXPIRES_IN: 1h
          DELIVERY_SERVICE_URL: http://localhost:8000
          NODE_ENV: test
        run: npm test

      # - name: SonarQube scan
      #   uses: SonarSource/sonarcloud-github-action@master
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ── Test (Python Delivery Service) ────────────────────────────────────────
  delivery-service:
    name: Delivery Service — Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: delivery-service
        run: pip install -r requirements.txt

      - name: Run pytest
        working-directory: delivery-service
        run: pytest test_main.py -v
